<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>番茄钟</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-glass: rgba(255, 255, 255, 0.78);
      --panel-border: rgba(255, 255, 255, 0.72);
      --text: #162033;
      --muted: #657086;
      --line: #dfe5ef;
      --soft: #eef2f7;
      --soft-panel: #fbfcfe;
      --field-bg: #ffffff;
      --ring-track: #ebeff5;
      --glow-a: rgba(198, 235, 222, 0.74);
      --glow-b: rgba(215, 230, 255, 0.76);
      --glow-c: rgba(255, 231, 226, 0.58);
      --body-overlay: linear-gradient(rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.08));
      --grid-line: rgba(22, 32, 51, 0.026);
      --primary: #e5484d;
      --primary-dark: #c7353b;
      --primary-weak: #fff0f1;
      --accent: #2563eb;
      --focus-bg: #edf8f3;
      --focus-border: #cfe9dd;
      --focus-label: #4d7d6c;
      --focus-text: #1f493d;
      --success: #17803d;
      --warning: #b45309;
      --shadow: 0 18px 48px rgba(20, 31, 54, 0.1);
      --ambient-shadow: 0 24px 70px rgba(31, 73, 61, 0.13);
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #111827;
      --panel: #192233;
      --panel-glass: rgba(25, 34, 51, 0.82);
      --panel-border: rgba(148, 163, 184, 0.2);
      --text: #f4f7fb;
      --muted: #a9b4c5;
      --line: #334155;
      --soft: #243047;
      --soft-panel: #202b3f;
      --field-bg: #111827;
      --ring-track: #26344c;
      --glow-a: rgba(33, 91, 80, 0.34);
      --glow-b: rgba(55, 76, 121, 0.38);
      --glow-c: rgba(115, 52, 57, 0.26);
      --body-overlay: linear-gradient(rgba(15, 23, 42, 0.2), rgba(15, 23, 42, 0.58));
      --grid-line: rgba(226, 232, 240, 0.035);
      --primary: #ff6b70;
      --primary-dark: #f05258;
      --primary-weak: #3b222b;
      --accent: #7aa7ff;
      --focus-bg: #172d2a;
      --focus-border: #24514a;
      --focus-label: #8fd2bd;
      --focus-text: #d6f6ec;
      --success: #70d68a;
      --warning: #f0b15d;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.3);
      --ambient-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      position: relative;
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 12% 12%, var(--glow-a) 0, transparent 32%),
        radial-gradient(circle at 86% 8%, var(--glow-b) 0, transparent 34%),
        radial-gradient(circle at 50% 92%, var(--glow-c) 0, transparent 36%),
        linear-gradient(135deg, var(--panel) 0%, var(--bg) 45%, var(--focus-bg) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
    }

    body::before {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      background:
        var(--body-overlay),
        repeating-linear-gradient(
          90deg,
          var(--grid-line) 0,
          var(--grid-line) 1px,
          transparent 1px,
          transparent 82px
        );
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent 70%);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(300px, 420px);
      gap: 22px;
      width: min(1120px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 0;
    }

    .timer-panel,
    .side-panel {
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel-glass);
      box-shadow: var(--ambient-shadow);
      backdrop-filter: blur(18px);
    }

    .timer-panel {
      display: flex;
      min-width: 0;
      flex-direction: column;
      justify-content: space-between;
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }

    .topbar-actions {
      display: grid;
      justify-items: end;
      gap: 10px;
      min-width: 148px;
    }

    .theme-field {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .theme-select {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field-bg);
      color: var(--text);
      padding: 0 10px;
      outline: none;
    }

    .theme-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(229, 72, 77, 0.13);
    }

    .title-block {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1.2;
    }

    h1 {
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: 0;
    }

    h2 {
      font-size: 18px;
    }

    .subtitle,
    .helper,
    .stats,
    .task-meta {
      color: var(--muted);
      line-height: 1.5;
    }

    .subtitle {
      max-width: 560px;
      font-size: 15px;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      width: min(100%, 460px);
      margin-top: 30px;
      border-radius: 8px;
      background: var(--soft);
      padding: 6px;
    }

    .mode-tab {
      min-height: 42px;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-weight: 750;
    }

    .mode-tab[aria-pressed="true"] {
      background: var(--panel);
      color: var(--primary);
      box-shadow: 0 6px 16px rgba(20, 31, 54, 0.09);
    }

    .clock-wrap {
      display: grid;
      justify-items: center;
      gap: 22px;
      margin: 34px 0 28px;
      text-align: center;
    }

    .progress-ring {
      display: grid;
      place-items: center;
      width: min(62vw, 360px);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        conic-gradient(var(--primary) var(--progress, 0deg), var(--ring-track) 0),
        var(--ring-track);
    }

    .clock-face {
      display: grid;
      place-items: center;
      width: calc(100% - 30px);
      height: calc(100% - 30px);
      border-radius: 50%;
      background: var(--panel);
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .time {
      font-size: clamp(58px, 11vw, 104px);
      font-variant-numeric: tabular-nums;
      font-weight: 850;
      letter-spacing: 0;
      line-height: 1;
    }

    .status {
      min-height: 26px;
      color: var(--muted);
      font-size: 16px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .button {
      min-width: 112px;
      min-height: 46px;
      border-radius: 8px;
      padding: 0 18px;
      background: var(--soft);
      color: var(--text);
      font-weight: 800;
    }

    .button.primary {
      min-width: 146px;
      background: var(--primary);
      color: white;
      box-shadow: 0 10px 22px rgba(229, 72, 77, 0.22);
    }

    .button.primary:hover {
      background: var(--primary-dark);
    }

    .button.ghost {
      background: transparent;
      color: var(--muted);
      outline: 1px solid var(--line);
    }

    .focus-card {
      display: grid;
      gap: 8px;
      margin-top: 20px;
      border: 1px solid var(--focus-border);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.56), transparent),
        var(--focus-bg);
      padding: 16px;
    }

    .focus-label {
      color: var(--focus-label);
      font-size: 13px;
      font-weight: 800;
    }

    .focus-task {
      overflow-wrap: anywhere;
      color: var(--focus-text);
      font-size: 20px;
      font-weight: 800;
    }

    .side-panel {
      display: grid;
      align-content: start;
      gap: 18px;
      min-width: 0;
      padding: 22px;
    }

    .section {
      display: grid;
      gap: 12px;
    }

    .stats-grid,
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat,
    .setting {
      display: grid;
      gap: 5px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft-panel);
      padding: 12px;
    }

    .stat strong {
      font-size: 24px;
      line-height: 1;
    }

    .stat span,
    .setting label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .setting input,
    .task-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field-bg);
      color: var(--text);
      outline: none;
    }

    .setting input {
      padding: 9px 8px;
    }

    .task-input {
      min-height: 44px;
      padding: 10px 12px;
    }

    .setting input:focus,
    .task-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(229, 72, 77, 0.13);
    }

    .task-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .task-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .task-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft-panel);
      padding: 10px;
    }

    .task-item.active {
      border-color: rgba(229, 72, 77, 0.45);
      background: var(--primary-weak);
    }

    .task-toggle {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--muted);
      font-weight: 900;
    }

    .task-item.done .task-toggle {
      background: #dcfce7;
      color: var(--success);
    }

    .task-title {
      min-width: 0;
      overflow-wrap: anywhere;
      font-weight: 750;
    }

    .task-item.done .task-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-actions {
      display: flex;
      gap: 6px;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--muted);
      font-weight: 900;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 16px;
      color: var(--muted);
      text-align: center;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
        width: min(100% - 24px, 680px);
        padding: 12px 0;
      }

      .timer-panel,
      .side-panel {
        padding: 18px;
      }

      .topbar,
      .task-form {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      .topbar-actions {
        justify-items: start;
        width: 100%;
      }

      .stats-grid,
      .settings-grid {
        grid-template-columns: 1fr;
      }

      .progress-ring {
        width: min(78vw, 320px);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="timer-panel" aria-label="番茄钟计时器">
      <div>
        <header class="topbar">
          <div class="title-block">
            <h1>番茄钟</h1>
            <div class="subtitle">专注一段时间，休息一下，再继续。默认 25 分钟专注、5 分钟短休息、15 分钟长休息。</div>
          </div>
          <div class="topbar-actions">
            <label class="theme-field" for="theme-toggle">
              主题
              <select class="theme-select" id="theme-toggle" data-testid="theme-toggle" aria-label="切换主题">
                <option value="light">浅色模式</option>
                <option value="dark">深色模式</option>
              </select>
            </label>
            <div class="stats" data-testid="cycle-label">第 1 轮</div>
          </div>
        </header>

        <nav class="mode-tabs" aria-label="计时模式">
          <button class="mode-tab" type="button" data-mode="work" data-testid="mode-work" aria-pressed="true">专注</button>
          <button class="mode-tab" type="button" data-mode="short" data-testid="mode-short" aria-pressed="false">短休息</button>
          <button class="mode-tab" type="button" data-mode="long" data-testid="mode-long" aria-pressed="false">长休息</button>
        </nav>

        <div class="clock-wrap">
          <div class="progress-ring" data-testid="progress-ring" aria-hidden="true">
            <div class="clock-face">
              <div class="time" data-testid="time">25:00</div>
            </div>
          </div>
          <div class="status" data-testid="status" aria-live="polite">准备开始专注。</div>
          <div class="controls">
            <button class="button primary" type="button" data-testid="start-pause">开始</button>
            <button class="button" type="button" data-testid="reset">重置</button>
            <button class="button ghost" type="button" data-testid="skip">跳过</button>
          </div>
        </div>
      </div>

      <div class="focus-card">
        <div class="focus-label">当前任务</div>
        <div class="focus-task" data-testid="focus-task">还没有任务，添加一个要完成的小目标。</div>
      </div>
    </section>

    <aside class="side-panel" aria-label="番茄钟设置和任务">
      <section class="section" aria-label="今日统计">
        <h2>今日统计</h2>
        <div class="stats-grid">
          <div class="stat">
            <strong data-testid="completed-count">0</strong>
            <span>完成番茄</span>
          </div>
          <div class="stat">
            <strong data-testid="focus-minutes">0</strong>
            <span>专注分钟</span>
          </div>
          <div class="stat">
            <strong data-testid="done-count">0</strong>
            <span>完成任务</span>
          </div>
        </div>
      </section>

      <section class="section" aria-label="时长设置">
        <h2>时长设置</h2>
        <div class="settings-grid">
          <div class="setting">
            <label for="work-minutes">专注</label>
            <input id="work-minutes" data-testid="setting-work" type="number" min="1" max="180" value="25" inputmode="numeric">
          </div>
          <div class="setting">
            <label for="short-minutes">短休</label>
            <input id="short-minutes" data-testid="setting-short" type="number" min="1" max="60" value="5" inputmode="numeric">
          </div>
          <div class="setting">
            <label for="long-minutes">长休</label>
            <input id="long-minutes" data-testid="setting-long" type="number" min="1" max="90" value="15" inputmode="numeric">
          </div>
        </div>
        <div class="helper">修改当前模式的时长会立即重置该模式计时。</div>
      </section>

      <section class="section" aria-label="任务清单">
        <h2>任务清单</h2>
        <form class="task-form" data-testid="task-form">
          <input class="task-input" data-testid="task-input" type="text" placeholder="添加任务，例如：整理需求" autocomplete="off">
          <button class="button" type="submit" data-testid="add-task">添加</button>
        </form>
        <ul class="task-list" data-testid="task-list"></ul>
        <div class="empty" data-testid="empty-tasks">清单为空。先写下这轮要推进的事。</div>
      </section>
    </aside>
  </main>

  <script>
    (() => {
      const storageKey = "pomodoroTimer.v1";
      const modes = {
        work: { label: "专注", setting: "workMinutes" },
        short: { label: "短休息", setting: "shortMinutes" },
        long: { label: "长休息", setting: "longMinutes" }
      };

      const defaultState = () => ({
        mode: "work",
        theme: "light",
        isRunning: false,
        remainingSeconds: 25 * 60,
        settings: {
          workMinutes: 25,
          shortMinutes: 5,
          longMinutes: 15,
          longBreakEvery: 4
        },
        completedPomodoros: 0,
        focusSeconds: 0,
        tasks: []
      });

      const dom = {
        time: document.querySelector('[data-testid="time"]'),
        status: document.querySelector('[data-testid="status"]'),
        ring: document.querySelector('[data-testid="progress-ring"]'),
        startPause: document.querySelector('[data-testid="start-pause"]'),
        reset: document.querySelector('[data-testid="reset"]'),
        skip: document.querySelector('[data-testid="skip"]'),
        modeTabs: [...document.querySelectorAll("[data-mode]")],
        cycleLabel: document.querySelector('[data-testid="cycle-label"]'),
        completedCount: document.querySelector('[data-testid="completed-count"]'),
        focusMinutes: document.querySelector('[data-testid="focus-minutes"]'),
        doneCount: document.querySelector('[data-testid="done-count"]'),
        focusTask: document.querySelector('[data-testid="focus-task"]'),
        settingWork: document.querySelector('[data-testid="setting-work"]'),
        settingShort: document.querySelector('[data-testid="setting-short"]'),
        settingLong: document.querySelector('[data-testid="setting-long"]'),
        themeToggle: document.querySelector('[data-testid="theme-toggle"]'),
        taskForm: document.querySelector('[data-testid="task-form"]'),
        taskInput: document.querySelector('[data-testid="task-input"]'),
        taskList: document.querySelector('[data-testid="task-list"]'),
        emptyTasks: document.querySelector('[data-testid="empty-tasks"]')
      };

      const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
      const durationFor = (mode, settings = state.settings) =>
        settings[modes[mode].setting] * 60;

      const normalizeTask = (task) => ({
        id: task.id || String(Date.now() + Math.random()),
        title: String(task.title || "").trim() || "未命名任务",
        done: Boolean(task.done),
        active: Boolean(task.active)
      });

      const loadState = () => {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
          if (!saved || typeof saved !== "object") return defaultState();
          const next = defaultState();
          next.settings = {
            ...next.settings,
            ...saved.settings
          };
          next.settings.workMinutes = clamp(Number(next.settings.workMinutes) || 25, 1, 180);
          next.settings.shortMinutes = clamp(Number(next.settings.shortMinutes) || 5, 1, 60);
          next.settings.longMinutes = clamp(Number(next.settings.longMinutes) || 15, 1, 90);
          next.mode = modes[saved.mode] ? saved.mode : "work";
          next.theme = saved.theme === "dark" ? "dark" : "light";
          next.remainingSeconds = clamp(
            Number(saved.remainingSeconds) || durationFor(next.mode, next.settings),
            0,
            durationFor(next.mode, next.settings)
          );
          next.completedPomodoros = Math.max(0, Number(saved.completedPomodoros) || 0);
          next.focusSeconds = Math.max(0, Number(saved.focusSeconds) || 0);
          next.tasks = Array.isArray(saved.tasks) ? saved.tasks.map(normalizeTask) : [];
          next.isRunning = false;
          return next;
        } catch (error) {
          console.warn("番茄钟数据读取失败，已使用默认设置。", error);
          return defaultState();
        }
      };

      let state = loadState();
      let intervalId = null;

      const persist = () => {
        localStorage.setItem(storageKey, JSON.stringify({ ...state, isRunning: false }));
      };

      const formatTime = (seconds) => {
        const minutes = Math.floor(seconds / 60);
        const remainder = seconds % 60;
        return `${String(minutes).padStart(2, "0")}:${String(remainder).padStart(2, "0")}`;
      };

      const activeTask = () => state.tasks.find((task) => task.active && !task.done)
        || state.tasks.find((task) => !task.done)
        || null;

      const setActiveTask = (id) => {
        state.tasks = state.tasks.map((task) => ({
          ...task,
          active: task.id === id
        }));
        persist();
        render();
      };

      const stopTicker = () => {
        if (intervalId) {
          clearInterval(intervalId);
          intervalId = null;
        }
      };

      const switchMode = (mode, shouldRun = false) => {
        state.mode = mode;
        state.remainingSeconds = durationFor(mode);
        state.isRunning = shouldRun;
        if (!shouldRun) stopTicker();
        if (shouldRun) startTicker();
        persist();
        render();
      };

      const nextModeAfterCompletion = () => {
        if (state.mode !== "work") return "work";
        return state.completedPomodoros % state.settings.longBreakEvery === 0
          ? "long"
          : "short";
      };

      const completeCurrentSession = ({ countWork = true } = {}) => {
        const completedMode = state.mode;
        if (completedMode === "work" && countWork) {
          state.completedPomodoros += 1;
        }
        const nextMode = nextModeAfterCompletion();
        state.mode = nextMode;
        state.remainingSeconds = durationFor(nextMode);
        state.isRunning = false;
        stopTicker();
        persist();
        render();
        const message = completedMode === "work"
          ? "这轮专注完成了，休息一下。"
          : "休息结束，回到专注。";
        dom.status.textContent = message;
      };

      const tick = (seconds = 1) => {
        const wholeSeconds = Math.max(0, Math.floor(seconds));
        for (let index = 0; index < wholeSeconds; index += 1) {
          if (!state.isRunning) break;
          if (state.mode === "work") state.focusSeconds += 1;
          state.remainingSeconds = Math.max(0, state.remainingSeconds - 1);
          if (state.remainingSeconds === 0) {
            completeCurrentSession();
            return;
          }
        }
        persist();
        render();
      };

      const startTicker = () => {
        stopTicker();
        intervalId = setInterval(() => tick(1), 1000);
      };

      const toggleRunning = () => {
        state.isRunning = !state.isRunning;
        if (state.isRunning) {
          startTicker();
        } else {
          stopTicker();
        }
        persist();
        render();
      };

      const resetCurrent = () => {
        state.isRunning = false;
        state.remainingSeconds = durationFor(state.mode);
        stopTicker();
        persist();
        render();
      };

      const addTask = (title) => {
        const trimmed = title.trim();
        if (!trimmed) return;
        const hasActive = state.tasks.some((task) => task.active && !task.done);
        state.tasks.push({
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
          title: trimmed,
          done: false,
          active: !hasActive
        });
        dom.taskInput.value = "";
        persist();
        render();
      };

      const toggleTaskDone = (id) => {
        state.tasks = state.tasks.map((task) => task.id === id
          ? { ...task, done: !task.done, active: task.done ? task.active : false }
          : task
        );
        if (!state.tasks.some((task) => task.active && !task.done)) {
          const nextTask = state.tasks.find((task) => !task.done);
          if (nextTask) nextTask.active = true;
        }
        persist();
        render();
      };

      const removeTask = (id) => {
        const removedWasActive = state.tasks.some((task) => task.id === id && task.active);
        state.tasks = state.tasks.filter((task) => task.id !== id);
        if (removedWasActive) {
          const nextTask = state.tasks.find((task) => !task.done);
          if (nextTask) nextTask.active = true;
        }
        persist();
        render();
      };

      const updateSetting = (key, value) => {
        const limits = {
          workMinutes: [1, 180],
          shortMinutes: [1, 60],
          longMinutes: [1, 90]
        };
        const [min, max] = limits[key];
        state.settings[key] = clamp(Number(value) || min, min, max);
        if (modes[state.mode].setting === key) {
          resetCurrent();
          return;
        }
        persist();
        render();
      };

      const updateTheme = (theme) => {
        state.theme = theme === "dark" ? "dark" : "light";
        persist();
        render();
      };

      const renderTasks = () => {
        dom.taskList.innerHTML = "";
        dom.emptyTasks.classList.toggle("hidden", state.tasks.length > 0);

        state.tasks.forEach((task) => {
          const item = document.createElement("li");
          item.className = `task-item${task.done ? " done" : ""}${task.active ? " active" : ""}`;
          item.dataset.taskId = task.id;

          const toggle = document.createElement("button");
          toggle.type = "button";
          toggle.className = "task-toggle";
          toggle.dataset.action = "toggle";
          toggle.setAttribute("aria-label", task.done ? "标记为未完成" : "标记为完成");
          toggle.textContent = task.done ? "✓" : "";

          const title = document.createElement("div");
          title.className = "task-title";
          title.textContent = task.title;

          const actions = document.createElement("div");
          actions.className = "task-actions";

          const focus = document.createElement("button");
          focus.type = "button";
          focus.className = "icon-button";
          focus.dataset.action = "focus";
          focus.disabled = task.done;
          focus.title = "设为当前任务";
          focus.setAttribute("aria-label", "设为当前任务");
          focus.textContent = ">";

          const remove = document.createElement("button");
          remove.type = "button";
          remove.className = "icon-button";
          remove.dataset.action = "remove";
          remove.title = "删除任务";
          remove.setAttribute("aria-label", "删除任务");
          remove.textContent = "×";

          actions.append(focus, remove);
          item.append(toggle, title, actions);
          dom.taskList.append(item);
        });
      };

      const render = () => {
        const total = durationFor(state.mode);
        const elapsed = total - state.remainingSeconds;
        const degrees = total > 0 ? (elapsed / total) * 360 : 0;
        const active = activeTask();

        dom.time.textContent = formatTime(state.remainingSeconds);
        dom.ring.style.setProperty("--progress", `${degrees}deg`);
        dom.startPause.textContent = state.isRunning ? "暂停" : "开始";
        dom.status.textContent = state.isRunning
          ? `${modes[state.mode].label}进行中。`
          : `准备开始${modes[state.mode].label}。`;
        dom.cycleLabel.textContent = `第 ${state.completedPomodoros + 1} 轮`;
        dom.completedCount.textContent = String(state.completedPomodoros);
        dom.focusMinutes.textContent = String(Math.floor(state.focusSeconds / 60));
        dom.doneCount.textContent = String(state.tasks.filter((task) => task.done).length);
        dom.focusTask.textContent = active
          ? active.title
          : "还没有任务，添加一个要完成的小目标。";

        dom.settingWork.value = state.settings.workMinutes;
        dom.settingShort.value = state.settings.shortMinutes;
        dom.settingLong.value = state.settings.longMinutes;
        dom.themeToggle.value = state.theme;
        document.documentElement.setAttribute("data-theme", state.theme);

        dom.modeTabs.forEach((tab) => {
          tab.setAttribute("aria-pressed", String(tab.dataset.mode === state.mode));
        });

        renderTasks();
      };

      dom.startPause.addEventListener("click", toggleRunning);
      dom.reset.addEventListener("click", resetCurrent);
      dom.skip.addEventListener("click", () => completeCurrentSession({ countWork: false }));
      dom.modeTabs.forEach((tab) => {
        tab.addEventListener("click", () => switchMode(tab.dataset.mode, false));
      });
      dom.settingWork.addEventListener("input", (event) =>
        updateSetting("workMinutes", event.target.value)
      );
      dom.settingShort.addEventListener("input", (event) =>
        updateSetting("shortMinutes", event.target.value)
      );
      dom.settingLong.addEventListener("input", (event) =>
        updateSetting("longMinutes", event.target.value)
      );
      dom.themeToggle.addEventListener("change", (event) => updateTheme(event.target.value));
      dom.taskForm.addEventListener("submit", (event) => {
        event.preventDefault();
        addTask(dom.taskInput.value);
      });
      dom.taskList.addEventListener("click", (event) => {
        const item = event.target.closest("[data-task-id]");
        const action = event.target.closest("[data-action]");
        if (!item || !action) return;
        if (action.dataset.action === "toggle") toggleTaskDone(item.dataset.taskId);
        if (action.dataset.action === "focus") setActiveTask(item.dataset.taskId);
        if (action.dataset.action === "remove") removeTask(item.dataset.taskId);
      });

      window.__pomodoroApp = {
        get state() {
          return JSON.parse(JSON.stringify(state));
        },
        resetForTest(seed = {}) {
          stopTicker();
          state = {
            ...defaultState(),
            ...seed,
            settings: {
              ...defaultState().settings,
              ...(seed.settings || {})
            },
            tasks: Array.isArray(seed.tasks) ? seed.tasks.map(normalizeTask) : []
          };
          if (!modes[state.mode]) state.mode = "work";
          state.theme = seed.theme === "dark" ? "dark" : "light";
          state.remainingSeconds = typeof seed.remainingSeconds === "number"
            ? seed.remainingSeconds
            : durationFor(state.mode);
          state.isRunning = Boolean(seed.isRunning);
          if (state.isRunning) startTicker();
          persist();
          render();
        },
        tick,
        storageKey
      };

      render();
    })();
  </script>
</body>
</html>
